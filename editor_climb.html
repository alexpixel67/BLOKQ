<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOKQ Editor | The Climb</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        :root {
            --ide-bg: #0b1016; --ide-panel: #131a22; --ide-border: #222f3e;
            --ide-highlight: #00e701; --accent-blue: #00d2ff; --text-main: #a9b6c2; --text-bright: #ffffff;
        }
        body { background-color: var(--ide-bg); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* TOOLBAR */
        .top-bar { background-color: #070a0f; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--ide-border); z-index: 10; }
        .brand { font-weight: bold; color: var(--text-bright); font-size: 14px; }
        .toolbar { display: flex; gap: 10px; align-items: center; }
        .world-name-input { background: rgba(255,255,255,0.05); border: 1px solid var(--ide-border); color: white; font-weight: bold; font-size: 14px; outline: none; padding: 8px 15px; border-radius: 6px; width: 250px; }
        .world-name-input:focus { border-color: var(--ide-highlight); }
        .btn { background: #1f2b38; border: 1px solid var(--ide-border); color: white; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--ide-highlight); color: #000; border: none; }

        /* LAYOUT */
        .layout { display: flex; flex: 1; overflow: hidden; }
        
        /* CENTER VIEWPORT */
        .viewport { flex: 1; position: relative; background: #05070a; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .climb-view { width: 100%; height: 100%; position: relative; background: linear-gradient(#546E7A, #263238); background-size: cover; background-position: center; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .climb-avatar { font-size: 80px; position: absolute; left: 10%; bottom: 20%; transition: all 0.1s linear; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); }
        .climb-multiplier { font-size: 72px; font-weight: 900; color: white; text-shadow: 0 5px 20px rgba(0,0,0,0.8); z-index: 2; }
        .playtest-btn { position: absolute; bottom: 30px; background: white; color: black; padding: 12px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; border: none; font-size: 14px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 10; transition: 0.2s; }

        /* RIGHT CONFIGURATOR */
        .configurator { width: 340px; background-color: var(--ide-panel); border-left: 1px solid var(--ide-border); display: flex; flex-direction: column; overflow-y: auto; }
        .config-section { padding: 20px; border-bottom: 1px solid var(--ide-border); }
        .config-title { font-size: 12px; font-weight: bold; color: white; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        
        .input-group { margin-bottom: 15px; }
        .input-label { display: block; font-size: 11px; color: #888; margin-bottom: 6px; font-weight: bold; text-transform: uppercase; }
        .ide-input { width: 100%; background: #0b1016; border: 1px solid var(--ide-border); color: white; padding: 10px; border-radius: 6px; outline: none; font-size: 13px; }
        
        .emoji-picker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .emoji-btn { background: var(--ide-bg); border: 1px solid var(--ide-border); border-radius: 6px; font-size: 24px; padding: 10px 0; cursor: pointer; }
        .emoji-btn.selected { border-color: var(--accent-blue); background: rgba(0, 210, 255, 0.1); }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">Blueprint: <span>The Climb</span></div>
        <div class="toolbar">
            <input type="text" id="world-title" class="world-title-input" value="Chicken Crossing">
            <button class="btn" onclick="window.location.href='create.html'">← Back to Library</button>
            <button class="btn btn-primary" id="publish-btn">Deploy World</button>
        </div>
    </div>

    <div class="layout">
        <!-- LIVE VIEWPORT -->
        <div class="viewport">
            <div class="climb-view" id="climb-view">
                <div class="climb-multiplier" id="climb-multi">1.00x</div>
                <div class="climb-avatar" id="climb-avatar">🐔</div>
            </div>
            <button class="playtest-btn" id="playtest-btn">▶ Run Playtest</button>
        </div>

        <!-- CONFIGURATOR -->
        <div class="configurator">
            <div class="config-section">
                <div class="config-title">Visual Skinning</div>
                <div class="input-group">
                    <label class="input-label">Player Avatar</label>
                    <div class="emoji-picker">
                        <button class="emoji-btn selected" onclick="setAvatar('🐔', this)">🐔</button>
                        <button class="emoji-btn" onclick="setAvatar('🚀', this)">🚀</button>
                        <button class="emoji-btn" onclick="setAvatar('🏃', this)">🏃</button>
                        <button class="emoji-btn" onclick="setAvatar('🛸', this)">🛸</button>
                    </div>
                </div>
                <div class="input-group">
                    <label class="input-label">Environment Theme</label>
                    <select class="ide-input" id="climb-theme" onchange="updateTheme()">
                        <option value="road">Highway / Road</option>
                        <option value="space">Deep Space</option>
                        <option value="cyber">Cyberpunk City</option>
                    </select>
                </div>
            </div>

            <div class="config-section">
                <div class="config-title">Mathematical Settings</div>
                <div class="input-group">
                    <label class="input-label">Volatility Curve</label>
                    <select class="ide-input" id="climb-volatility">
                        <option value="low">Low Risk (Frequent low payouts)</option>
                        <option value="med" selected>Standard Balanced</option>
                        <option value="high">Extreme (Rare high payouts)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label class="input-label">House Edge (%)</label>
                    <input type="number" class="ide-input" id="house-edge" value="4.0" step="0.5" min="1" max="10">
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let auth = null, db = null, activeUser = null;
        const climbView = document.getElementById('climb-view');
        const climbAvatar = document.getElementById('climb-avatar');
        const climbMulti = document.getElementById('climb-multi');
        const playtestBtn = document.getElementById('playtest-btn');
        const publishBtn = document.getElementById('publish-btn');

        window.setAvatar = function(emoji, btn) {
            document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            climbAvatar.innerText = emoji;
        }

        window.updateTheme = function() {
            const theme = document.getElementById('climb-theme').value;
            if (theme === 'road') climbView.style.background = "linear-gradient(#546E7A, #263238)";
            if (theme === 'space') climbView.style.background = "radial-gradient(circle at top, #0f2027, #203a43, #2c5364)";
            if (theme === 'cyber') climbView.style.background = "linear-gradient(135deg, #1f005c, #5b0060, #870160)";
        }

        let isAnimating = false;
        playtestBtn.onclick = () => {
            if (isAnimating) return;
            isAnimating = true;
            playtestBtn.style.display = "none";
            climbAvatar.style.left = "10%"; climbAvatar.style.bottom = "20%"; climbAvatar.style.transform = "scale(1)";
            
            let multi = 1.00;
            let targetCrash = 1.00 + (Math.random() * 3);
            
            let interval = setInterval(() => {
                multi += 0.02 + (multi * 0.01);
                climbMulti.innerText = multi.toFixed(2) + "x";
                
                const progress = Math.min(1, (multi - 1) / (targetCrash - 1));
                climbAvatar.style.left = `${10 + (progress * 60)}%`;
                climbAvatar.style.bottom = `${20 + (progress * 40)}%`;

                if (multi >= targetCrash) {
                    clearInterval(interval);
                    climbMulti.innerText = "CRASH!";
                    climbMulti.style.color = "var(--error-red)";
                    climbAvatar.innerText = "💥";
                    climbAvatar.style.transform = "scale(2)";
                    
                    setTimeout(() => {
                        climbMulti.style.color = "white";
                        climbAvatar.innerText = document.querySelector('.emoji-btn.selected').innerText;
                        climbAvatar.style.transform = "scale(1)";
                        climbAvatar.style.left = "10%"; climbAvatar.style.bottom = "20%";
                        climbMulti.innerText = "1.00x";
                        playtestBtn.style.display = "block";
                        isAnimating = false;
                    }, 2000);
                }
            }, 50);
        };

        // Firebase Integration
        async function initFirebase() {
            try {
                const res = await fetch('/api/config');
                const config = await res.json();
                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);
                onAuthStateChanged(auth, user => { activeUser = user; });
            } catch(e) { console.log("Running locally."); }
        }

        publishBtn.addEventListener('click', async () => {
            if (!activeUser) return alert("Must be logged in.");
            publishBtn.disabled = true; publishBtn.innerText = "Deploying...";

            try {
                await addDoc(collection(db, "games"), {
                    title: document.getElementById('world-title').value.trim() || "Chicken Crossing",
                    type: 'climb',
                    emoji: climbAvatar.innerText,
                    theme: document.getElementById('climb-theme').value,
                    edge: parseFloat(document.getElementById('house-edge').value),
                    creator: activeUser.displayName || activeUser.email.split('@')[0],
                    creatorUid: activeUser.uid,
                    createdAt: new Date()
                });
                publishBtn.innerText = "Deployed!";
                publishBtn.style.background = "white";
                setTimeout(() => window.location.href = 'home.html', 1500);
            } catch (error) {
                alert("Deploy failed.");
                publishBtn.disabled = false; publishBtn.innerText = "Deploy World";
            }
        });

        initFirebase();
    </script>
</body>
</html>
