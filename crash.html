<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOKQ | Crash</title>
    <style>
        /* CSS RESET & CASINO THEME */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --bg-hover: #334155;
            --accent-green: #00e701;
            --accent-blue: #0ea5e9;
            --text-main: #94a3b8;
            --text-bright: #ffffff;
            --border-color: #334155;
            --border-radius: 12px;
            --error-red: #ef4444;
        }

        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR / CONTROLS */
        aside { width: 320px; background-color: var(--bg-panel); padding: 25px; display: flex; flex-direction: column; gap: 20px; border-right: 1px solid var(--border-color); z-index: 5; }
        .logo-back { font-size: 14px; font-weight: bold; color: var(--accent-blue); cursor: pointer; text-decoration: none; margin-bottom: 10px; display: inline-block; }
        
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .control-label { font-size: 11px; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; color: var(--text-main); display: flex; justify-content: space-between; }
        
        .input-wrapper { display: flex; background: var(--bg-dark); border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; align-items: center; }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-weight: bold; font-size: 14px; width: 100%; }
        .input-suffix { padding-right: 15px; font-weight: bold; color: #64748b; }
        .btn-mod { background: var(--bg-hover); border: none; color: white; width: 45px; height: 100%; font-weight: bold; cursor: pointer; border-left: 1px solid var(--border-color); transition: 0.2s; }
        .btn-mod:hover { background: #475569; }

        .btn-action { background: var(--accent-blue); color: #000; border: none; padding: 18px; border-radius: 8px; font-weight: 900; font-size: 18px; text-transform: uppercase; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3); width: 100%; margin-top: 10px; }
        .btn-action:hover { background: #38bdf8; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(14, 165, 233, 0.5); }
        .btn-action:active { transform: translateY(1px); }
        
        /* Dynamic Button States */
        .btn-action.cashout { background: var(--accent-green); box-shadow: 0 4px 15px rgba(0, 231, 1, 0.3); }
        .btn-action.cashout:hover { background: #00c401; box-shadow: 0 6px 20px rgba(0, 231, 1, 0.5); }
        .btn-action.disabled { background: #475569; color: #94a3b8; box-shadow: none; cursor: not-allowed; transform: none; }

        /* VIEWPORT */
        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #0f172a; position: relative; }
        
        /* HEADER */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; z-index: 10; border-bottom: 1px solid var(--border-color); }
        .header-title { font-size: 20px; font-weight: bold; color: white; }
        .balance-box { background: var(--bg-panel); border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 8px; font-weight: bold; display: flex; gap: 8px; align-items: center; }
        .balance-box span { color: var(--accent-green); }

        /* GRAPH AREA */
        .graph-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; padding: 40px; }
        canvas { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* MULTIPLIER DISPLAY */
        .multiplier-display { position: relative; z-index: 2; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .current-multi { font-size: 100px; font-weight: 900; color: white; line-height: 1; font-variant-numeric: tabular-nums; text-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .multi-status { font-size: 18px; font-weight: bold; color: var(--text-main); margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; }

        /* RECENT HITS BAR */
        .recent-hits { height: 50px; background: rgba(30, 41, 59, 0.8); border-top: 1px solid var(--border-color); display: flex; align-items: center; gap: 8px; padding: 0 20px; overflow-x: auto; scrollbar-width: none; z-index: 10; position: relative; }
        .hit-pill { padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; color: white; min-width: 55px; text-align: center; animation: popIn 0.2s ease-out forwards; }
        .hit-pill.high { color: var(--accent-green); background: rgba(0, 231, 1, 0.1); border: 1px solid rgba(0, 231, 1, 0.2); }
        .hit-pill.low { color: var(--error-red); background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); }
        @keyframes popIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <aside>
        <div>
            <a href="index.html" class="logo-back">⬅ Return to Lobby</a>
            <div class="header-title" style="margin-top: 5px;">🚀 CRASH</div>
        </div>

        <div class="control-group">
            <label class="control-label">Bet Amount</label>
            <div class="input-wrapper">
                <input type="number" id="bet-amount" value="10" min="1">
                <button class="btn-mod" id="bet-half-btn">½</button>
                <button class="btn-mod" id="bet-double-btn">2x</button>
            </div>
        </div>

        <div class="control-group">
            <label class="control-label"><span>Auto Cashout</span> <span>(Optional)</span></label>
            <div class="input-wrapper">
                <input type="number" id="auto-cashout" value="2.00" step="0.1" min="1.01">
                <div class="input-suffix">x</div>
            </div>
        </div>

        <button class="btn-action" id="action-btn">Start Game</button>
        
        <div style="font-size: 11px; color: #64748b; line-height: 1.5; margin-top: 10px;">
            The multiplier will rise exponentially. Cash out before the crash to multiply your wager. If it crashes before you cash out, your wager is lost.
        </div>
    </aside>

    <main>
        <header>
            <div class="header-title">UGC Crash Hub</div>
            <div class="balance-box">
                <span id="bq-balance">Loading...</span> BQ
            </div>
        </header>

        <div class="graph-container" id="graph-container">
            <canvas id="crash-canvas"></canvas>
            <div class="multiplier-display">
                <div class="current-multi" id="current-multi">1.00x</div>
                <div class="multi-status" id="multi-status">Ready to Launch</div>
            </div>
        </div>

        <div class="recent-hits" id="recent-hits">
            <!-- Crash history pills injected here -->
        </div>
    </main>

    <!-- FIREBASE AND CRASH ENGINE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, getIdToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // State variables
        let auth = null, db = null, activeUser = null, activeUserRef = null;
        let userBalance = 0;
        let userIdToken = null;
        
        // Game State Engine: 'idle' | 'starting' | 'running' | 'cashed_out' | 'crashed'
        let gameState = 'idle';
        let currentBet = 0;
        let currentMulti = 1.00;
        let crashPoint = 1.00;
        let animationFrame = null;
        let startTime = 0;
        let targetAutoCashout = null;

        // UI Elements
        const balanceDisplay = document.getElementById('bq-balance');
        const betInput = document.getElementById('bet-amount');
        const autoCashoutInput = document.getElementById('auto-cashout');
        const actionBtn = document.getElementById('action-btn');
        const multiDisplay = document.getElementById('current-multi');
        const statusDisplay = document.getElementById('multi-status');
        const recentHitsBar = document.getElementById('recent-hits');
        
        const canvas = document.getElementById('crash-canvas');
        const ctx = canvas.getContext('2d');
        
        // Resize Canvas dynamically
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            drawGraphIdle();
        }
        window.addEventListener('resize', resizeCanvas);

        // Firebase Init
        async function initGame() {
            try {
                const response = await fetch('/api/config');
                if (!response.ok) throw new Error("Config not loaded.");
                const config = await response.json();

                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);

                onAuthStateChanged(auth, async user => {
                    if (!user) {
                        window.location.href = "login.html";
                    } else {
                        activeUser = user;
                        activeUserRef = doc(db, "users", user.uid);
                        userIdToken = await getIdToken(user);
                        
                        onSnapshot(activeUserRef, (docSnap) => {
                            if (docSnap.exists()) {
                                userBalance = docSnap.data().balance;
                                balanceDisplay.innerText = userBalance.toLocaleString();
                            }
                        });
                    }
                });

                resizeCanvas();
            } catch (err) { console.error(err); }
        }

        // Modifiers
        document.getElementById('bet-half-btn').onclick = () => betInput.value = Math.max(1, Math.floor(parseInt(betInput.value) / 2));
        document.getElementById('bet-double-btn').onclick = () => betInput.value = parseInt(betInput.value) * 2;

        // Mathematical Crash Point Generation (House Edge: ~3%)
        // Generated locally for visual sync in stateless version
        function generateCrashPoint() {
            const roll = Math.random();
            if (roll < 0.03) return 1.00; // 3% instant crash
            return Math.max(1.00, parseFloat((0.99 / (1 - roll)).toFixed(2)));
        }

        // ==========================================
        // GAME LOOP CONTROLLER
        // ==========================================
        actionBtn.addEventListener('click', async () => {
            if (gameState === 'idle' || gameState === 'crashed') {
                startGame();
            } else if (gameState === 'running') {
                cashOut();
            }
        });

        async function startGame() {
            currentBet = parseInt(betInput.value);
            targetAutoCashout = parseFloat(autoCashoutInput.value);

            if (isNaN(currentBet) || currentBet <= 0) return alert("Invalid Bet");
            if (currentBet > userBalance) return alert("Insufficient BQ Balance");
            
            // Lock UI
            betInput.disabled = true;
            autoCashoutInput.disabled = true;
            gameState = 'starting';
            actionBtn.className = "btn-action disabled";
            
            try {
                // Call secure wager API to deduct balance at start
                const response = await fetch('/api/wager', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        idToken: userIdToken,
                        uid: activeUser.uid,
                        gameType: 'crash',
                        betAmount: currentBet
                    })
                });

                const result = await response.json();
                if (!result.success) throw new Error(result.error);
                
                // Update local balance
                userBalance = result.newBalance;

            } catch (err) {
                alert('Game failed to start: ' + err.message);
                gameState = 'idle';
                actionBtn.className = "btn-action";
                betInput.disabled = false;
                autoCashoutInput.disabled = false;
                return;
            }

            crashPoint = generateCrashPoint();
            currentMulti = 1.00;
            
            // 3 Second Countdown
            let countdown = 3;
            multiDisplay.style.color = "white";
            statusDisplay.innerText = "Launching in...";
            
            let tick = setInterval(() => {
                multiDisplay.innerText = `${countdown.toFixed(1)}s`;
                countdown -= 0.1;
                
                if (countdown <= 0) {
                    clearInterval(tick);
                    launchRocket();
                }
            }, 100);
        }

        function launchRocket() {
            gameState = 'running';
            actionBtn.className = "btn-action cashout";
            actionBtn.innerText = "Cash Out";
            statusDisplay.innerText = "Rocket in Flight";
            
            startTime = Date.now();
            animationFrame = requestAnimationFrame(updateGraph);
        }

        async function cashOut() {
            if (gameState !== 'running') return;
            
            gameState = 'cashed_out';
            actionBtn.className = "btn-action disabled";
            actionBtn.innerText = "Cashing Out...";
            statusDisplay.innerText = "Securing Winnings...";
            
            try {
                // Call secure wager API to process cashout
                const response = await fetch('/api/wager', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        idToken: userIdToken,
                        uid: activeUser.uid,
                        gameType: 'crash_cashout',
                        betAmount: currentBet,
                        gameParams: { cashoutMultiplier: parseFloat(currentMulti.toFixed(2)) }
                    })
                });

                const result = await response.json();
                if (result.success) {
                    userBalance = result.newBalance;
                }
            } catch (err) {
                console.error("Cashout API Error:", err);
            }

            actionBtn.innerText = "Cashed Out";
            statusDisplay.innerText = "Success! Waiting for crash...";
            multiDisplay.style.color = "var(--accent-green)";
        }

        function triggerCrash() {
            gameState = 'crashed';
            cancelAnimationFrame(animationFrame);
            
            multiDisplay.innerText = `${crashPoint.toFixed(2)}x`;
            multiDisplay.style.color = "var(--error-red)";
            statusDisplay.innerText = "CRASHED";
            
            actionBtn.className = "btn-action";
            actionBtn.innerText = "Play Again";
            
            betInput.disabled = false;
            autoCashoutInput.disabled = false;
            
            appendRecentHit(crashPoint);
            drawGraphCrashed();
        }

        // ==========================================
        // CANVAS GRAPHICS
        // ==========================================
        function updateGraph() {
            if (gameState !== 'running' && gameState !== 'cashed_out') return;

            // Exponential growth formula over time
            const elapsedMs = Date.now() - startTime;
            currentMulti = Math.pow(Math.E, 0.00006 * elapsedMs);

            // Did it crash?
            if (currentMulti >= crashPoint) {
                currentMulti = crashPoint;
                triggerCrash();
                return;
            }

            // Auto Cashout trigger
            if (gameState === 'running' && targetAutoCashout && currentMulti >= targetAutoCashout) {
                cashOut();
            }

            // Render Text
            if (gameState === 'running') {
                multiDisplay.innerText = `${currentMulti.toFixed(2)}x`;
            }

            // Render Line Graphic
            drawActiveGraph(elapsedMs);

            animationFrame = requestAnimationFrame(updateGraph);
        }

        function drawActiveGraph(elapsed) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const padding = 20;
            const startX = padding;
            const startY = canvas.height - padding;
            
            // Dynamic width/height scaling to make graph look like it's zooming out
            const totalX = canvas.width - padding * 2;
            const totalY = canvas.height - padding * 2;
            
            // Growth curves
            const progressX = Math.min(1, elapsed / 10000); 
            const currentX = startX + (totalX * progressX);
            
            const curveIntensity = Math.pow(progressX, 2);
            const currentY = startY - (totalY * curveIntensity);

            // Draw Gradient Underneath Line
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.quadraticCurveTo(currentX * 0.8, startY, currentX, currentY);
            ctx.lineTo(currentX, startY);
            ctx.closePath();
            
            const gradient = ctx.createLinearGradient(0, startY, 0, 0);
            gradient.addColorStop(0, "rgba(14, 165, 233, 0)");
            gradient.addColorStop(1, "rgba(14, 165, 233, 0.4)");
            ctx.fillStyle = gradient;
            ctx.fill();

            // Draw Line
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.quadraticCurveTo(currentX * 0.8, startY, currentX, currentY);
            ctx.strokeStyle = "var(--accent-blue)";
            ctx.lineWidth = 4;
            ctx.stroke();

            // Draw Rocket/Dot
            ctx.beginPath();
            ctx.arc(currentX, currentY, 6, 0, Math.PI * 2);
            ctx.fillStyle = "#ffffff";
            ctx.shadowColor = "var(--accent-blue)";
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawGraphIdle() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.moveTo(20, canvas.height - 20);
            ctx.lineTo(canvas.width - 20, canvas.height - 20);
            ctx.strokeStyle = "#334155";
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function drawGraphCrashed() {
            ctx.strokeStyle = "var(--error-red)";
            ctx.stroke();
        }

        function appendRecentHit(mult) {
            const pill = document.createElement('div');
            pill.className = `hit-pill ${mult >= 2.0 ? 'high' : 'low'}`;
            pill.innerText = `${mult.toFixed(2)}x`;
            recentHitsBar.insertBefore(pill, recentHitsBar.firstChild);
            if (recentHitsBar.children.length > 15) recentHitsBar.removeChild(recentHitsBar.lastChild);
        }

        initGame();
    </script>
</body>
</html>
