<!-- Replace the script block inside your home.html with this secure version -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc, collection, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let auth = null;
        let db = null;
        let activeUser = null;
        let activeUserRef = null;
        let userBalance = 0;
        let activeGameType = "";
        let nonceCount = 0;

        const bqBalanceDisplay = document.getElementById('bq-balance');
        const userProfilePic = document.getElementById('user-profile-pic');
        const profileDropdown = document.getElementById('profileDropdown');
        const dropdownUsername = document.getElementById('dropdown-username');
        const dropdownEmail = document.getElementById('dropdown-email');
        const gamesGrid = document.getElementById('games-grid');
        const gameModal = document.getElementById('gameModal');
        const modalTitle = document.getElementById('modal-title');
        const betBtn = document.getElementById('main-bet-btn');
        const betInput = document.getElementById('bet-amount');

        const crashUI = document.getElementById('crash-interface');
        const plinkoUI = document.getElementById('plinko-interface');
        const rngUI = document.getElementById('rng-interface');
        const fallbackUI = document.getElementById('fallback-interface');
        const fallbackResult = document.getElementById('game-result');

        let crashActive = false;
        let crashMultiplier = 1.00;
        let crashInterval = null;

        const canvas = document.getElementById('plinko-canvas');
        const ctx = canvas.getContext('2d');
        let plinkoActive = false;

        async function initializePlatform() {
            try {
                const response = await fetch('/api/config');
                if (!response.ok) throw new Error("Could not retrieve config.");
                const firebaseConfig = await response.json();

                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                onAuthStateChanged(auth, handleAuthStateChange);
            } catch (error) {
                console.error("Initialization Error:", error);
            }
        }

        async function handleAuthStateChange(user) {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            activeUser = user;
            activeUserRef = doc(db, "users", user.uid);

            dropdownUsername.innerText = user.displayName || "Genesis Account";
            dropdownEmail.innerText = user.email || "Wallet Session";
            
            if (user.photoURL) {
                userProfilePic.style.backgroundImage = `url('${user.photoURL}')`;
                userProfilePic.innerText = "";
            } else {
                userProfilePic.innerText = (user.displayName || user.email || "?").charAt(0).toUpperCase();
            }

            onSnapshot(activeUserRef, (docSnapshot) => {
                if (docSnapshot.exists()) {
                    userBalance = docSnapshot.data().balance;
                    bqBalanceDisplay.innerText = userBalance.toLocaleString();
                } else {
                    setDoc(activeUserRef, {
                        username: user.displayName || "Genesis Creator",
                        email: user.email || "No email",
                        balance: 10000,
                        createdAt: new Date()
                    });
                }
            });

            bindUGEvents();
            bindDynamicGamesLobby();
        }

        function bindDynamicGamesLobby() {
            const gamesQuery = query(collection(db, "games"), orderBy("createdAt", "desc"));
            onSnapshot(gamesQuery, (querySnapshot) => {
                gamesGrid.innerHTML = "";
                if (querySnapshot.empty) {
                    gamesGrid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px;">No active UGC worlds found. Click "Deploy World" to launch the first!</div>`;
                    return;
                }
                querySnapshot.forEach((doc) => {
                    const game = doc.data();
                    const card = document.createElement('div');
                    card.className = "game-card";
                    card.innerHTML = `
                        <div class="live-players"><span class="dot"></span> ${Math.floor(Math.random() * 200 + 5)}</div>
                        <div class="thumbnail">${game.emoji || '🎮'}</div>
                        <div class="game-info">
                            <div class="game-title">${escapeHTML(game.title)}</div>
                            <div class="game-creator">by ${escapeHTML(game.creator)}</div>
                        </div>
                    `;
                    card.addEventListener('click', () => openGame(game.title, game.type));
                    gamesGrid.appendChild(card);
                });
            });
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        userProfilePic.addEventListener('click', (e) => {
            e.stopPropagation();
            profileDropdown.classList.toggle('active');
        });

        document.addEventListener('click', () => { profileDropdown.classList.remove('active'); });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => { window.location.href = 'login.html'; });
        });

        window.openCreateModal = function() { document.getElementById('createModal').style.display = 'flex'; }
        window.closeCreateModal = function() { document.getElementById('createModal').style.display = 'none'; }

        async function deployUGCWorld() {
            const titleInput = document.getElementById('new-game-title').value.trim();
            const typeSelect = document.getElementById('new-game-type').value;
            const emojiInput = document.getElementById('new-game-emoji').value.trim();

            if (!titleInput) {
                alert("Please declare a world title.");
                return;
            }

            try {
                await addDoc(collection(db, "games"), {
                    title: titleInput,
                    type: typeSelect,
                    emoji: emojiInput || '🎮',
                    creator: activeUser.displayName || activeUser.email.split('@')[0],
                    creatorUid: activeUser.uid,
                    createdAt: new Date()
                });
                closeCreateModal();
                document.getElementById('new-game-title').value = "";
            } catch (error) {
                alert("Failed to deploy world.");
            }
        }

        function bindUGEvents() {
            document.getElementById('btn-deploy-confirm').addEventListener('click', deployUGCWorld);
            document.getElementById('close-modal-btn').addEventListener('click', closeGame);
            betBtn.addEventListener('click', handleWager);
        }

        function openGame(gameName, gameType) {
            modalTitle.innerText = gameName;
            gameModal.style.display = 'flex';
            resetAllInterfaces();
            generateNewServerHash();
            activeGameType = gameType;

            if (gameType === 'crash') {
                crashUI.style.display = "flex";
                document.getElementById('crash-multiplier').innerText = "1.00x";
                document.getElementById('crash-multiplier').style.color = "white";
                document.getElementById('crash-rocket').style.transform = "translate(0, 0) scale(1)";
                document.getElementById('crash-rocket').innerText = "🚀";
                betBtn.innerText = "Launch Rocket";
            } else if (gameType === 'plinko') {
                plinkoUI.style.display = "flex";
                drawPlinkoBoard();
                betBtn.innerText = "Drop Plinko Ball";
            } else if (gameType === 'rng') {
                rngUI.style.display = "flex";
                document.getElementById('aura-output').innerText = "Roll for an Aura!";
                document.getElementById('aura-output').style.color = "white";
                document.getElementById('aura-rarity-output').innerText = "";
                betBtn.innerText = "Roll Aura (100 BQ)";
                betInput.value = 100;
                betInput.disabled = true;
            } else {
                fallbackUI.style.display = "flex";
                fallbackResult.innerText = "";
                betBtn.innerText = "Wager BQ";
                betInput.disabled = false;
            }
        }

        function closeGame() {
            gameModal.style.display = 'none';
            if (crashActive) {
                clearInterval(crashInterval);
                crashActive = false;
            }
            betInput.disabled = false;
        }

        function resetAllInterfaces() {
            crashUI.style.display = "none";
            plinkoUI.style.display = "none";
            rngUI.style.display = "none";
            fallbackUI.style.display = "none";
            betBtn.disabled = false;
            betBtn.className = "btn-bet";
            betInput.disabled = false;
        }

        function generateNewServerHash() {
            nonceCount++;
            document.getElementById('pf-nonce').innerText = nonceCount;
            const hexChars = "0123456789abcdef";
            let fakeHash = "";
            for (let i = 0; i < 64; i++) {
                fakeHash += hexChars[Math.floor(Math.random() * 16)];
            }
            document.getElementById('pf-server-hash').innerText = fakeHash;
            document.getElementById('pf-client-seed').innerText = activeUser ? activeUser.uid.substring(0, 16) : "blokq_session";
        }

        // -------------------------------------------------------------
        // SECURE API COMMUNICATION FOR GAME CALCULATIONS
        // -------------------------------------------------------------
        async function handleWager() {
            const betValue = parseInt(betInput.value);

            if (isNaN(betValue) || betValue <= 0) {
                alert("Please enter a valid wager.");
                return;
            }

            if (betValue > userBalance && !crashActive) {
                alert("Insufficient Balance!");
                return;
            }

            // Obtain JWT idToken dynamically from active Firebase Auth Session [1.1.2]
            const idToken = await activeUser.getIdToken();
            betBtn.disabled = true;

            try {
                // Post secure payload to Cloudflare edge [1.1.2]
                const response = await fetch('/api/wager', {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        idToken,
                        uid: activeUser.uid,
                        gameType: activeGameType,
                        betAmount: betValue
                    })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || "Wager rejected by security broker.");
                }

                const result = await response.json();

                // Trigger UI Visualizations based on Server Response
                if (activeGameType === "rng") {
                    renderRngVisuals(result);
                } else if (activeGameType === "plinko") {
                    renderPlinkoVisuals(result, betValue);
                } else if (activeGameType === "crash") {
                    runSecureCrashVisuals(result, betValue);
                }

            } catch (err) {
                alert(err.message);
                betBtn.disabled = false;
            }
        }

        // Render Sols RNG securely returned from Server
        function renderRngVisuals(result) {
            const output = document.getElementById('aura-output');
            const rarityOutput = document.getElementById('aura-rarity-output');

            output.style.color = "white";
            output.innerText = "🌌 Aligning Constellations...";
            rarityOutput.innerText = "";

            setTimeout(() => {
                const details = result.gameDetails;
                output.innerText = details.auraName.toUpperCase();
                output.style.color = details.color;
                output.style.textShadow = `0 0 15px ${details.color}`;
                rarityOutput.innerText = `Rarity Factor: ${details.rarity} | New Balance: ${result.newBalance.toLocaleString()} BQ`;
                betBtn.disabled = false;
            }, 800);
        }

        // Render Plinko securely calculated path from Server
        function renderPlinkoVisuals(result, bet) {
            plinkoActive = true;
            betInput.disabled = true;

            const finalY = startY + (rows * spacingY) + 10;
            const path = result.gameDetails.path;
            
            let bx = startX;
            let by = 15;
            let step = 0;
            let pathTimer = setInterval(() => {
                if (step < path.length) {
                    // Force the ball to follow the server-side precalculated path
                    bx += path[step] * 16;
                    by += 32;
                    step++;
                } else {
                    clearInterval(pathTimer);
                    by = finalY;
                    plinkoActive = false;
                    betBtn.disabled = false;
                    betInput.disabled = false;
                }
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawPlinkoBoard();
                ctx.beginPath();
                ctx.arc(bx, by, 7, 0, Math.PI * 2);
                ctx.fillStyle = "var(--accent-green)";
                ctx.fill();
            }, 150);
        }

        // Secure Crash Single Player Visual loop
        async function runSecureCrashVisuals(result, bet) {
            crashActive = true;
            crashMultiplier = 1.00;
            const crashThreshold = result.gameDetails.crashPoint;

            betBtn.innerText = "CASH OUT @ 1.00x";
            betBtn.className = "btn-bet cashout-active";
            betBtn.disabled = false;

            document.getElementById('crash-multiplier').style.color = "white";
            document.getElementById('crash-rocket').style.transform = "translate(0, 0) scale(1)";
            document.getElementById('crash-rocket').innerText = "🚀";

            crashInterval = setInterval(async () => {
                crashMultiplier = parseFloat((crashMultiplier + 0.01 + (crashMultiplier * 0.005)).toFixed(2));
                document.getElementById('crash-multiplier').innerText = `${crashMultiplier.toFixed(2)}x`;
                
                const shakeX = (Math.random() - 0.5) * 6;
                const shakeY = (Math.random() - 0.5) * 6 - (crashMultiplier * 2);
                document.getElementById('crash-rocket').style.transform = `translate(${shakeX}px, ${shakeY}px) scale(${1 + (crashMultiplier * 0.01)})`;

                if (crashMultiplier >= crashThreshold) {
                    clearInterval(crashInterval);
                    crashActive = false;
                    document.getElementById('crash-multiplier').innerText = "CRASHED! 💥";
                    document.getElementById('crash-multiplier').style.color = "#ff4d4d";
                    document.getElementById('crash-rocket').innerText = "💥";
                    document.getElementById('crash-rocket').style.transform = "scale(2.5)";
                    
                    betBtn.innerText = "Launch Rocket";
                    betBtn.className = "btn-bet";
                    betInput.disabled = false;
                } else {
                    betBtn.innerText = `CASH OUT @ ${crashMultiplier.toFixed(2)}x`;
                }
            }, 80);

            // Cashout event triggers Firestore update securely
            betBtn.onclick = async function() {
                if (crashActive) {
                    clearInterval(crashInterval);
                    crashActive = false;
                    
                    const winnings = Math.floor(bet * crashMultiplier);
                    
                    // Deduct and credit secure balances on the database
                    const idToken = await activeUser.getIdToken();
                    const patchRes = await fetch('/api/wager', {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            idToken,
                            uid: activeUser.uid,
                            gameType: "crash_cashout",
                            betAmount: bet,
                            cashoutMultiplier: crashMultiplier
                        })
                    });

                    document.getElementById('crash-multiplier').style.color = "var(--accent-green)";
                    document.getElementById('crash-multiplier').innerText = `SUCCESS! Cashed @ ${crashMultiplier.toFixed(2)}x`;
                    document.getElementById('crash-rocket').innerText = "🛰️";
                    
                    betBtn.innerText = "Launch Rocket";
                    betBtn.className = "btn-bet";
                    betBtn.onclick = handleWager;
                    betInput.disabled = false;
                }
            };
        }

        const rows = 8;
        const pins = [];
        const pinRadius = 4;
        const spacingX = 32;
        const spacingY = 32;
        const startX = 200;
        const startY = 40;
        const multipliers = [8.0, 3.0, 1.2, 0.5, 0.2, 0.5, 1.2, 3.0, 8.0];

        for (let r = 0; r < rows; r++) {
            const rowPins = r + 3; 
            const rowWidth = (rowPins - 1) * spacingX;
            const xOffset = startX - (rowWidth / 2);
            for (let p = 0; p < rowPins; p++) {
                pins.push({ x: xOffset + (p * spacingX), y: startY + (r * spacingY) });
            }
        }

        function drawPlinkoBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#2a3b47";
            pins.forEach(pin => {
                ctx.beginPath();
                ctx.arc(pin.x, pin.y, pinRadius, 0, Math.PI * 2);
                ctx.fill();
            });

            const finalY = startY + (rows * spacingY) + 10;
            const totalBuckets = multipliers.length;
            const bucketWidth = 36;
            const bucketOffset = startX - ((totalBuckets * bucketWidth) / 2);

            for (let i = 0; i < totalBuckets; i++) {
                const bx = bucketOffset + (i * bucketWidth);
                ctx.fillStyle = multipliers[i] >= 1.0 ? "rgba(0, 231, 1, 0.15)" : "rgba(255, 77, 77, 0.15)";
                ctx.strokeStyle = multipliers[i] >= 1.0 ? "var(--accent-green)" : "#ff4d4d";
                ctx.lineWidth = 1;
                ctx.fillRect(bx + 2, finalY, bucketWidth - 4, 25);
                ctx.strokeRect(bx + 2, finalY, bucketWidth - 4, 25);

                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 10px monospace";
                ctx.textAlign = "center";
                ctx.fillText(`${multipliers[i]}x`, bx + (bucketWidth / 2), finalY + 16);
            }
        }

        initializePlatform();
    </script>
