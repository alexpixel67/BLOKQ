<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOKQ | Authorize Portal</title>
    <style>
        /* [Keep your exact visual CSS styling from the previous login.html here] */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        :root {
            --bg-dark: #070d14;
            --bg-panel: #0d1622;
            --bg-hover: #162231;
            --accent-green: #00e701;
            --accent-cyan: #00f0ff;
            --text-main: #ffffff;
            --text-muted: #8fa0b5;
            --border-color: #1b2b3e;
            --border-radius: 12px;
        }
        body { background-color: var(--bg-dark); color: var(--text-main); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        .grid-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 231, 1, 0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 231, 1, 0.015) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 1; }
        .glow-orb { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(0, 240, 255, 0.04) 0%, transparent 70%); bottom: -150px; left: -100px; pointer-events: none; z-index: 1; }
        .login-card { background: rgba(13, 22, 34, 0.75); border: 1px solid var(--border-color); width: 460px; padding: 40px; border-radius: 16px; backdrop-filter: blur(15px); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6); z-index: 10; position: relative; }
        .logo { font-size: 32px; font-weight: 900; letter-spacing: 1.5px; text-align: center; margin-bottom: 10px; }
        .logo span { color: var(--accent-green); }
        .subtitle { color: var(--text-muted); font-size: 14px; text-align: center; margin-bottom: 30px; }
        .btn-submit { width: 100%; background: var(--accent-green); color: var(--bg-dark); border: none; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; transition: 0.2s; }
        .btn-submit:hover { box-shadow: 0 0 15px rgba(0, 231, 1, 0.4); transform: translateY(-1px); }
        .divider { color: var(--text-muted); font-size: 11px; margin: 25px 0 20px 0; display: flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border-color); }
        .social-grid { display: grid; grid-template-columns: 1fr; gap: 12px; } /* Switched to full-width Google button for priority */
        .btn-social { background: var(--bg-dark); border: 1px solid var(--border-color); color: white; padding: 14px; border-radius: 8px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 14px; font-weight: bold; transition: 0.2s; }
        .btn-social:hover { background: var(--bg-hover); border-color: var(--text-muted); }
        .sync-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-panel); border-radius: 16px; z-index: 20; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        .spinner { width: 50px; height: 50px; border: 3px solid rgba(0, 231, 1, 0.1); border-top: 3px solid var(--accent-green); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .sync-status { font-family: monospace; font-size: 12px; color: var(--accent-cyan); text-align: center; max-width: 250px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="grid-bg"></div>
    <div class="glow-orb"></div>

    <div class="login-card">
        <!-- LEDGER SYNCING OVERLAY -->
        <div id="sync-overlay" class="sync-overlay">
            <div class="spinner"></div>
            <h4 style="font-weight: bold; font-size: 18px;">Authenticating...</h4>
            <p class="sync-status" id="sync-text">Loading secure session keys...</p>
        </div>

        <div class="logo">🟩 BLOK<span>Q</span></div>
        <div class="subtitle">Connect your identity to enter the Arcade Protocol</div>

        <!-- AUTH FORM -->
        <div id="email-tab">
            <button type="button" class="btn-social" id="google-auth-btn">
                <span>🌐</span> Authorize with Google Account
            </button>
            <div class="subtitle" style="margin-top: 15px; margin-bottom: 0; font-size: 12px;">
                Using secure federated Google single sign-on.
            </div>
        </div>
    </div>

    <!-- MODULE-BASED FIREBASE CONTROLLER -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        let authInstance = null;

        // Initialize App by pulling variables from your Cloudflare Function
        async function initializeSecurityBroker() {
            try {
                // Fetch config from Cloudflare Pages Function endpoint
                const response = await fetch('/api/config');
                if (!response.ok) throw new Error("Could not retrieve config from edge server.");
                
                const firebaseConfig = await response.json();
                
                // Initialize Firebase SDK
                const app = initializeApp(firebaseConfig);
                authInstance = getAuth(app);

                // Enable the Google login button once SDK is ready
                document.getElementById('google-auth-btn').addEventListener('click', handleGoogleAuth);
            } catch (error) {
                console.error("Configuration Error:", error);
                document.getElementById('sync-text').innerText = "Security Broker failed to load. Check console.";
                document.getElementById('sync-overlay').style.display = 'flex';
            }
        }

        async function handleGoogleAuth() {
            if (!authInstance) return;

            const provider = new GoogleAuthProvider();
            const overlay = document.getElementById('sync-overlay');
            const syncText = document.getElementById('sync-text');

            try {
                overlay.style.display = 'flex';
                syncText.innerText = "Awaiting Google signature...";

                // Execute popup login
                const result = await signInWithPopup(authInstance, provider);
                const user = result.user;

                // Steps mimicking local database state synchronization
                const states = [
                    { time: 0, text: "Exchanging cryptographic tokens..." },
                    { time: 600, text: `Binding identity: ${user.displayName}...` },
                    { time: 1200, text: "Caching virtual ledger session..." },
                    { time: 1800, text: "Redirection active." }
                ];

                states.forEach(step => {
                    setTimeout(() => {
                        syncText.innerText = step.text;
                    }, step.time);
                });

                // Establish local session storage and redirect
                setTimeout(() => {
                    sessionStorage.setItem('blokq_logged_in', user.displayName || user.email.split('@')[0]);
                    window.location.href = 'home.html';
                }, 2400);

            } catch (error) {
                console.error("Authentication Failed:", error);
                overlay.style.display = 'none';
                alert(`Auth Failed: ${error.message}`);
            }
        }

        // Run setup on document ready
        initializeSecurityBroker();
    </script>
</body>
</html>
