<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOKQ | Authorize Portal</title>
    <style>
        /* CSS RESET & VARIABLES */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        :root {
            --bg-dark: #070d14;
            --bg-panel: #0d1622;
            --bg-hover: #162231;
            --accent-green: #00e701;
            --accent-cyan: #00f0ff;
            --text-main: #ffffff;
            --text-muted: #8fa0b5;
            --border-color: #1b2b3e;
            --border-radius: 12px;
        }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* BACKGROUND EFFECTS */
        .grid-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 231, 1, 0.015) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(0, 231, 1, 0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 1;
        }
        .glow-orb {
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.04) 0%, transparent 70%);
            bottom: -150px; left: -100px;
            pointer-events: none;
            z-index: 1;
        }

        /* LOGIN CARD container */
        .login-card {
            background: rgba(13, 22, 34, 0.75);
            border: 1px solid var(--border-color);
            width: 460px;
            padding: 40px;
            border-radius: 16px;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            z-index: 10;
            position: relative;
        }

        .logo {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-align: center;
            margin-bottom: 10px;
        }
        .logo span { color: var(--accent-green); }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
        }

        /* SWITCH TABS (Email vs Wallet) */
        .auth-tabs {
            display: flex;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            font-size: 13px;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: var(--bg-hover);
            color: var(--text-main);
        }

        /* FORMS */
        .form-section {
            display: none;
        }
        .form-section.active {
            display: block;
        }

        .input-group {
            margin-bottom: 15px;
            position: relative;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-group input {
            width: 100%;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            border-color: var(--accent-cyan);
        }

        .btn-submit {
            width: 100%;
            background: var(--accent-green);
            color: var(--bg-dark);
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn-submit:hover {
            box-shadow: 0 0 15px rgba(0, 231, 1, 0.4);
            transform: translateY(-1px);
        }

        /* SOCIAL LOGINS */
        .divider {
            color: var(--text-muted);
            font-size: 11px;
            margin: 25px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .social-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .btn-social {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-social:hover {
            background: var(--bg-hover);
            border-color: var(--text-muted);
        }

        /* WEB3 BUTTONS */
        .wallet-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn-wallet {
            width: 100%;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: white;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
        }
        .btn-wallet:hover {
            background: var(--bg-hover);
            border-color: var(--accent-cyan);
        }
        .wallet-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* INTERMEDIARY OVERLAY ANIMATION (SYNC STATE) */
        .sync-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-panel);
            border-radius: 16px;
            z-index: 20;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(0, 231, 1, 0.1);
            border-top: 3px solid var(--accent-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .sync-status {
            font-family: monospace;
            font-size: 12px;
            color: var(--accent-cyan);
            text-align: center;
            max-width: 250px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>
    <div class="glow-orb"></div>

    <div class="login-card">
        <!-- LEDGER SYNCING OVERLAY -->
        <div id="sync-overlay" class="sync-overlay">
            <div class="spinner"></div>
            <h4 style="font-weight: bold; font-size: 18px;">Authenticating...</h4>
            <p class="sync-status" id="sync-text">Resolving cryptographic identity...</p>
        </div>

        <div class="logo">🟩 BLOK<span>Q</span></div>
        <div class="subtitle">Connect your identity to enter the Arcade Protocol</div>

        <!-- AUTH TABS -->
        <div class="auth-tabs">
            <button class="tab-btn active" id="tab-email-btn">Identity Account</button>
            <button class="tab-btn" id="tab-wallet-btn">Web3 Wallet</button>
        </div>

        <!-- TAB 1: EMAIL & SOCIAL SIGN IN -->
        <div id="email-tab" class="form-section active">
            <form id="email-login-form">
                <div class="input-group">
                    <label for="email-field">Email Address</label>
                    <input type="email" id="email-field" placeholder="name@domain.com" required>
                </div>
                
                <div class="input-group" id="password-group">
                    <label for="password-field">Password</label>
                    <input type="password" id="password-field" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-submit" id="submit-btn">Authorize Session</button>
            </form>

            <div class="divider">or connect with</div>

            <div class="social-grid">
                <!-- Trigger actual Firebase Google Auth on this button -->
                <button class="btn-social" id="google-auth-btn">
                    <span>🌐</span> Google
                </button>
                <button class="btn-social" id="discord-auth-btn">
                    <span>👾</span> Discord
                </button>
                <button class="btn-social" id="telegram-auth-btn">
                    <span>✈️</span> Telegram
                </button>
            </div>
        </div>

        <!-- TAB 2: WEB3 WALLETS -->
        <div id="wallet-tab" class="form-section">
            <div class="wallet-list">
                <button class="btn-wallet" id="wallet-mm-btn">
                    <div class="wallet-brand">
                        <span style="font-size: 20px;">🦊</span>
                        <span>MetaMask</span>
                    </div>
                    <span style="font-size: 11px; color: var(--accent-cyan);">EVM Chain</span>
                </button>
                <button class="btn-wallet" id="wallet-phantom-btn">
                    <div class="wallet-brand">
                        <span style="font-size: 20px;">👻</span>
                        <span>Phantom Wallet</span>
                    </div>
                    <span style="font-size: 11px; color: var(--accent-cyan);">Solana/SVM</span>
                </button>
                <button class="btn-wallet" id="wallet-wc-btn">
                    <div class="wallet-brand">
                        <span style="font-size: 20px;">🔌</span>
                        <span>WalletConnect</span>
                    </div>
                    <span style="font-size: 11px; color: var(--text-muted);">Multi-Chain</span>
                </button>
            </div>
            
            <div class="subtitle" style="margin-top: 25px; margin-bottom: 0; font-size: 12px;">
                Connecting a wallet automatically validates ownership of BQ tokens and custom visual avatars.
            </div>
        </div>
    </div>

    <!-- MODULE-BASED FIREBASE CONTROLLER -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let authInstance = null;
        let dbInstance = null;

        // Tab and form navigation selectors
        const tabEmailBtn = document.getElementById('tab-email-btn');
        const tabWalletBtn = document.getElementById('tab-wallet-btn');
        const emailTab = document.getElementById('email-tab');
        const walletTab = document.getElementById('wallet-tab');
        const emailLoginForm = document.getElementById('email-login-form');

        // Tab Switching Logic
        tabEmailBtn.addEventListener('click', () => {
            tabEmailBtn.classList.add('active');
            tabWalletBtn.classList.remove('active');
            emailTab.classList.add('active');
            walletTab.classList.remove('active');
        });

        tabWalletBtn.addEventListener('click', () => {
            tabWalletBtn.classList.add('active');
            tabEmailBtn.classList.remove('active');
            walletTab.classList.add('active');
            emailTab.classList.remove('active');
        });

        // Initialize Firebase SDK dynamically using Cloudflare Function
        async function initializeSecurityBroker() {
            try {
                // Fetch credentials dynamically from Cloudflare Pages Function
                const response = await fetch('/api/config');
                if (!response.ok) throw new Error("Could not retrieve config from edge server.");
                
                const firebaseConfig = await response.json();
                
                // Initialize Firebase Web SDK
                const app = initializeApp(firebaseConfig);
                authInstance = getAuth(app);
                dbInstance = getFirestore(app);

                // Attach genuine auth behavior once initialized
                document.getElementById('google-auth-btn').addEventListener('click', handleGoogleAuth);
            } catch (error) {
                console.error("Configuration Error:", error);
                document.getElementById('sync-text').innerText = "Security Broker failed to load. Check console.";
                document.getElementById('sync-overlay').style.display = 'flex';
            }
        }

        // Shared authentication animation logic
        function executeAuthenticationProcess(finalUsername) {
            const overlay = document.getElementById('sync-overlay');
            const syncText = document.getElementById('sync-text');
            
            overlay.style.display = 'flex';

            const transitions = [
                { time: 0, text: "Contacting decentralized node array..." },
                { time: 600, text: "Generating cryptographically secure session..." },
                { time: 1200, text: "Verifying BQ ledger distribution balance..." },
                { time: 1800, text: "Session validated. Entering BLOKQ lobby." }
            ];

            transitions.forEach(step => {
                setTimeout(() => {
                    syncText.innerText = step.text;
                }, step.time);
            });

            setTimeout(() => {
                sessionStorage.setItem('blokq_logged_in', finalUsername);
                
                // Check for redirect parameter and navigate to the intended game
                const urlParams = new URLSearchParams(window.location.search);
                const redirectUrl = urlParams.get('redirect');
                
                if (redirectUrl) {
                    window.location.href = redirectUrl;
                } else {
                    window.location.href = 'index.html';
                }
            }, 2400);
        }

        // Handle Genuine Google Authentication (Real Integration)
        async function handleGoogleAuth() {
            if (!authInstance) return;

            const provider = new GoogleAuthProvider();
            const overlay = document.getElementById('sync-overlay');
            const syncText = document.getElementById('sync-text');

            try {
                overlay.style.display = 'flex';
                syncText.innerText = "Awaiting Google signature...";

                // Execute real Firebase Google OAuth Popup
                const result = await signInWithPopup(authInstance, provider);
                const user = result.user;

                // Check if user document exists, if not create with role: 'user' and balance: 10000 [1.1.2]
                const userRef = doc(dbInstance, 'users', user.uid);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        email: user.email,
                        displayName: user.displayName || user.email.split('@')[0],
                        balance: 10000, // <--- BIND BALANCES TO PREVENT CRASH! [1.1.2]
                        role: 'user',
                        createdAt: new Date().toISOString()
                    });
                }

                // Pass user display name to final dashboard transition
                const targetName = user.displayName || user.email.split('@')[0];
                executeAuthenticationProcess(targetName);

            } catch (error) {
                console.error("Authentication Failed:", error);
                overlay.style.display = 'none';
                alert(`Auth Failed: ${error.message}`);
            }
        }

        // Real email/password sign-in and sign-up handlers [1.1.2]
        emailLoginForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const emailValue = document.getElementById('email-field').value;
            const passwordValue = document.getElementById('password-field').value;
            const overlay = document.getElementById('sync-overlay');
            const syncText = document.getElementById('sync-text');
            
            if (!authInstance || !dbInstance) {
                alert("Firebase not initialized");
                return;
            }

            try {
                overlay.style.display = 'flex';
                syncText.innerText = "Authorizing identity...";

                // 1. Try to sign in first (Standard Stake flow) [1.1.2]
                try {
                    const userCredential = await signInWithEmailAndPassword(authInstance, emailValue, passwordValue);
                    const user = userCredential.user;
                    
                    // Double check document has balance
                    const userRef = doc(dbInstance, 'users', user.uid);
                    const userSnap = await getDoc(userRef);
                    if (!userSnap.exists()) {
                        await setDoc(userRef, {
                            email: user.email,
                            displayName: emailValue.split('@')[0],
                            balance: 10000,
                            role: 'user',
                            createdAt: new Date().toISOString()
                        });
                    }
                    
                    executeAuthenticationProcess(user.displayName || emailValue.split('@')[0]);
                } catch (signInError) {
                    // 2. If the user doesn't exist, automatically sign them up! [1.1.2]
                    if (signInError.code === 'auth/user-not-found' || signInError.code === 'auth/invalid-credential') {
                        syncText.innerText = "Creating secure identity...";
                        
                        const userCredential = await createUserWithEmailAndPassword(authInstance, emailValue, passwordValue);
                        const user = userCredential.user;

                        // Create user document with starting balance to avoid database crash [1.1.2]
                        await setDoc(doc(dbInstance, 'users', user.uid), {
                            email: user.email,
                            displayName: emailValue.split('@')[0],
                            balance: 10000, // <--- BIND BALANCES TO PREVENT CRASH! [1.1.2]
                            role: 'user',
                            createdAt: new Date().toISOString()
                        });

                        const derivedUsername = emailValue.split('@')[0];
                        executeAuthenticationProcess(derivedUsername);
                    } else {
                        throw signInError;
                    }
                }

            } catch (error) {
                console.error("Auth Failed:", error);
                overlay.style.display = 'none';
                alert(`Auth Failed: ${error.message}`);
            }
        });

        // Simulated Discord/Telegram Auth popups with Firestore user creation
        async function simulateOAuth(provider) {
            const width = 500, height = 600;
            const left = (screen.width / 2) - (width / 2);
            const top = (screen.height / 2) - (height / 2);
            
            const mockWindow = window.open("", `Sign In with ${provider}`, `width=${width},height=${height},top=${top},left=${left}`);
            mockWindow.document.write(`
                <html>
                <head>
                    <title>${provider} Authentication Gateway</title>
                    <style>
                        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
                        .btn { background: #10b981; color: #0f172a; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; }
                    </style>
                </head>
                <body>
                    <h3>BLOKQ Platform Request</h3>
                    <p>Authorize BLOKQ to access public profile information securely via ${provider}.</p>
                    <button class="btn" onclick="window.opener.postMessage('oauth-success-${provider}', '*'); window.close();">Approve & Continue</button>
                </body>
                </html>
            `);

            const handleMsg = async (event) => {
                if (event.data === `oauth-success-${provider}`) {
                    window.removeEventListener('message', handleMsg);
                    
                    // Create user document in Firestore for OAuth providers with balance [1.1.2]
                    if (dbInstance) {
                        const fakeUid = provider.toLowerCase() + '_' + Date.now();
                        await setDoc(doc(dbInstance, 'users', fakeUid), {
                            email: `${provider.toLowerCase()}@${provider.toLowerCase()}.com`,
                            displayName: `${provider}_User`,
                            balance: 10000, // <--- BIND BALANCES TO PREVENT CRASH! [1.1.2]
                            role: 'user',
                            provider: provider,
                            createdAt: new Date().toISOString()
                        });
                    }
                    
                    executeAuthenticationProcess(`${provider}_User`);
                }
            };
            window.addEventListener('message', handleMsg);
        }

        document.getElementById('discord-auth-btn').addEventListener('click', () => simulateOAuth('Discord'));
        document.getElementById('telegram-auth-btn').addEventListener('click', () => simulateOAuth('Telegram'));

        // Simulated Web3 Wallet Signatures with Firestore user creation
        async function simulateWalletConnect(walletType) {
            const address = walletType === 'MetaMask' ? '0x71C...392a' : 'HkZ8...7Y2q';
            const signRequest = confirm(
                `BLOKQ desires connection to ${walletType} (${address}).\n\n` +
                `Signature request validation details:\n` +
                `-----------------------------\n` +
                `Message: Welcome to BLOKQ! Please authorize this cryptographically signed message to sync your account database.\n` +
                `Nonce: ${Math.floor(Math.random() * 1000000)}\n\n` +
                `Click OK to sign securely.`
            );

            if (signRequest) {
                // Create user document in Firestore for wallet providers with balance [1.1.2]
                if (dbInstance) {
                    const fakeUid = walletType.toLowerCase().replace(' ', '_') + '_' + Date.now();
                    await setDoc(doc(dbInstance, 'users', fakeUid), {
                        email: `${walletType.toLowerCase()}@wallet.com`,
                        displayName: `${walletType}_Holder`,
                        balance: 10000, // <--- BIND BALANCES TO PREVENT CRASH! [1.1.2]
                        role: 'user',
                        provider: walletType,
                        walletAddress: address,
                        createdAt: new Date().toISOString()
                    });
                }
                
                executeAuthenticationProcess(`${walletType}_Holder`);
            }
        }

        document.getElementById('wallet-mm-btn').addEventListener('click', () => simulateWalletConnect('MetaMask'));
        document.getElementById('wallet-phantom-btn').addEventListener('click', () => simulateWalletConnect('Phantom'));
        document.getElementById('wallet-wc-btn').addEventListener('click', () => simulateWalletConnect('WalletConnect'));

        // Load the edge configurations on ready
        initializeSecurityBroker();
    </script>
</body>
</html>
