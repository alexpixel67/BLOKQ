<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOKQ | Authorize Portal</title>
    <style>
        /* CSS RESET & VARIABLES */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        :root {
            --bg-dark: #070d14;
            --bg-panel: #0d1622;
            --bg-hover: #162231;
            --accent-green: #00e701;
            --accent-cyan: #00f0ff;
            --text-main: #ffffff;
            --text-muted: #8fa0b5;
            --border-color: #1b2b3e;
            --border-radius: 12px;
        }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* BACKGROUND EFFECTS */
        .grid-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 231, 1, 0.015) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(0, 231, 1, 0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 1;
        }
        .glow-orb {
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.04) 0%, transparent 70%);
            bottom: -150px; left: -100px;
            pointer-events: none;
            z-index: 1;
        }

        /* LOGIN CARD container */
        .login-card {
            background: rgba(13, 22, 34, 0.75);
            border: 1px solid var(--border-color);
            width: 460px;
            padding: 40px;
            border-radius: 16px;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            z-index: 10;
            position: relative;
        }

        .logo {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-align: center;
            margin-bottom: 10px;
        }
        .logo span { color: var(--accent-green); }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
        }

        /* SWITCH TABS (Email vs Wallet) */
        .auth-tabs {
            display: flex;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            font-size: 13px;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: var(--bg-hover);
            color: var(--text-main);
        }

        /* FORMS */
        .form-section {
            display: none;
        }
        .form-section.active {
            display: block;
        }

        .input-group {
            margin-bottom: 15px;
            position: relative;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-group input {
            width: 100%;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            border-color: var(--accent-cyan);
        }

        /* PASSWORD / MAGIC LINK TOGGLE */
        .form-helper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            margin-bottom: 20px;
        }
        .form-helper a {
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: 600;
        }
        .form-helper label {
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .btn-submit {
            width: 100%;
            background: var(--accent-green);
            color: var(--bg-dark);
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: 0.2s;
        }
        .btn-submit:hover {
            box-shadow: 0 0 15px rgba(0, 231, 1, 0.4);
            transform: translateY(-1px);
        }

        /* SOCIAL LOGINS */
        .divider {
            color: var(--text-muted);
            font-size: 11px;
            margin: 25px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .social-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .btn-social {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-social:hover {
            background: var(--bg-hover);
            border-color: var(--text-muted);
        }

        /* WEB3 BUTTONS */
        .wallet-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn-wallet {
            width: 100%;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: white;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
        }
        .btn-wallet:hover {
            background: var(--bg-hover);
            border-color: var(--accent-cyan);
        }
        .wallet-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* INTERMEDIARY OVERLAY ANIMATION (SYNC STATE) */
        .sync-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-panel);
            border-radius: 16px;
            z-index: 20;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(0, 231, 1, 0.1);
            border-top: 3px solid var(--accent-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .sync-status {
            font-family: monospace;
            font-size: 12px;
            color: var(--accent-cyan);
            text-align: center;
            max-width: 250px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>
    <div class="glow-orb"></div>

    <div class="login-card">
        <!-- LEDGER SYNCING OVERLAY -->
        <div id="sync-overlay" class="sync-overlay">
            <div class="spinner"></div>
            <h4 style="font-weight: bold; font-size: 18px;">Authenticating...</h4>
            <p class="sync-status" id="sync-text">Resolving cryptographic identity...</p>
        </div>

        <div class="logo">🟩 BLOK<span>Q</span></div>
        <div class="subtitle">Connect your identity to enter the Arcade Protocol</div>

        <!-- AUTH TABS -->
        <div class="auth-tabs">
            <button class="tab-btn active" onclick="switchTab('email')">Identity Account</button>
            <button class="tab-btn" onclick="switchTab('wallet')">Web3 Wallet</button>
        </div>

        <!-- TAB 1: EMAIL & SOCIAL SIGN IN -->
        <div id="email-tab" class="form-section active">
            <form onsubmit="handleEmailSubmit(event)">
                <div class="input-group">
                    <label for="email-field">Email Address</label>
                    <input type="email" id="email-field" placeholder="name@domain.com" required>
                </div>
                
                <div class="input-group" id="password-group">
                    <label for="password-field">Password</label>
                    <input type="password" id="password-field" placeholder="••••••••" required>
                </div>

                <div class="form-helper">
                    <label>
                        <input type="checkbox" id="magic-link-check" onchange="toggleMagicLink()">
                        Use Passwordless Magic Link
                    </label>
                    <a href="#" id="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-submit" id="submit-btn">Authorize Session</button>
            </form>

            <div class="divider">or connect with</div>

            <div class="social-grid">
                <button class="btn-social" onclick="simulateOAuth('Google')">
                    <span>🌐</span> Google
                </button>
                <button class="btn-social" onclick="simulateOAuth('Discord')">
                    <span>👾</span> Discord
                </button>
                <button class="btn-social" onclick="simulateOAuth('Telegram')">
                    <span>✈️</span> Telegram
                </button>
            </div>
        </div>

        <!-- TAB 2: WEB3 WALLETS -->
        <div id="wallet-tab" class="form-section">
            <div class="wallet-list">
                <button class="btn-wallet" onclick="simulateWalletConnect('MetaMask')">
                    <div class="wallet-brand">
                        <span style="font-size: 20px;">🦊</span>
                        <span>MetaMask</span>
                    </div>
                    <span style="font-size: 11px; color: var(--accent-cyan);">EVM Chain</span>
                </button>
                <button class="btn-wallet" onclick="simulateWalletConnect('Phantom')">
                    <div class="wallet-brand">
                        <span style="font-size: 20px;">👻</span>
                        <span>Phantom Wallet</span>
                    </div>
                    <span style="font-size: 11px; color: var(--accent-cyan);">Solana/SVM</span>
                </button>
                <button class="btn-wallet" onclick="simulateWalletConnect('WalletConnect')">
                    <div class="wallet-brand">
                        <span style="font-size: 20px;">🔌</span>
                        <span>WalletConnect</span>
                    </div>
                    <span style="font-size: 11px; color: var(--text-muted);">Multi-Chain</span>
                </button>
            </div>
            
            <div class="subtitle" style="margin-top: 25px; margin-bottom: 0; font-size: 12px;">
                Connecting a wallet automatically validates ownership of BQ tokens and custom visual avatars.
            </div>
        </div>
    </div>

    <!-- SCRIPT CONTROLLER -->
    <script>
        // Tab switching logic (Email vs Wallet)
        function switchTab(tabType) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(section => section.classList.remove('active'));

            if (tabType === 'email') {
                event.target.classList.add('active');
                document.getElementById('email-tab').classList.add('active');
            } else {
                event.target.classList.add('active');
                document.getElementById('wallet-tab').classList.add('active');
            }
        }

        // Toggle Passwordless Magic Link input modification
        function toggleMagicLink() {
            const isMagicLink = document.getElementById('magic-link-check').checked;
            const passwordGroup = document.getElementById('password-group');
            const passwordInput = document.getElementById('password-field');
            const forgotLink = document.getElementById('forgot-link');
            const submitBtn = document.getElementById('submit-btn');

            if (isMagicLink) {
                passwordGroup.style.display = 'none';
                passwordInput.removeAttribute('required');
                forgotLink.style.display = 'none';
                submitBtn.innerText = "Send Magic Link";
            } else {
                passwordGroup.style.display = 'block';
                passwordInput.setAttribute('required', 'true');
                forgotLink.style.display = 'block';
                submitBtn.innerText = "Authorize Session";
            }
        }

        // Execution of the authentication transition steps
        function executeAuthenticationProcess(finalUsername) {
            const overlay = document.getElementById('sync-overlay');
            const syncText = document.getElementById('sync-text');
            
            overlay.style.display = 'flex';

            const transitions = [
                { time: 0, text: "Contacting decentralized node array..." },
                { time: 600, text: "Generating cryptographically secure session..." },
                { time: 1200, text: "Verifying BQ ledger distribution balance..." },
                { time: 1800, text: "Session validated. Entering BLOKQ lobby." }
            ];

            transitions.forEach(step => {
                setTimeout(() => {
                    syncText.innerText = step.text;
                }, step.time);
            });

            // Set session storage details and route to your main application lobby
            setTimeout(() => {
                sessionStorage.setItem('blokq_logged_in', finalUsername);
                window.location.href = 'home.html'; 
            }, 2400);
        }

        // 1. Email Submission
        function handleEmailSubmit(event) {
            event.preventDefault();
            const emailValue = document.getElementById('email-field').value;
            const isMagicLink = document.getElementById('magic-link-check').checked;
            
            // Extract username prefix from email as user identity
            const derivedUsername = emailValue.split('@')[0];

            if (isMagicLink) {
                alert(`Magic link dispatch simulated! Please check your test inbox at: ${emailValue}`);
            }
            executeAuthenticationProcess(derivedUsername);
        }

        // 2. Social OAuth Simulators
        function simulateOAuth(provider) {
            const width = 500, height = 600;
            const left = (screen.width / 2) - (width / 2);
            const top = (screen.height / 2) - (height / 2);
            
            // Open a mock window mimicking an external OAuth page
            const mockWindow = window.open("", `Sign In with ${provider}`, `width=${width},height=${height},top=${top},left=${left}`);
            
            mockWindow.document.write(`
                <html>
                <head>
                    <title>${provider} Authentication Gateway</title>
                    <style>
                        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
                        .btn { background: #10b981; color: #0f172a; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; }
                    </style>
                </head>
                <body>
                    <h3>BLOKQ Platform Request</h3>
                    <p>Authorize BLOKQ to access public profile information securely via ${provider}.</p>
                    <button class="btn" onclick="window.opener.postMessage('oauth-success-${provider}', '*'); window.close();">Approve & Continue</button>
                </body>
                </html>
            `);

            // Listen for window approval response
            window.addEventListener('message', function receiveSuccess(event) {
                if (event.data === `oauth-success-${provider}`) {
                    window.removeEventListener('message', receiveSuccess);
                    const mockUserName = `${provider}_User`;
                    executeAuthenticationProcess(mockUserName);
                }
            });
        }

        // 3. Web3 Wallet Connection Simulators
        function simulateWalletConnect(walletType) {
            const address = walletType === 'MetaMask' ? '0x71C...392a' : 'HkZ8...7Y2q';
            
            // Simulated interactive wallet signing prompt
            const signRequest = confirm(
                `BLOKQ desires connection to ${walletType} (${address}).\n\n` +
                `Signature request validation details:\n` +
                `-----------------------------\n` +
                `Message: Welcome to BLOKQ! Please authorize this cryptographically signed message to sync your account database.\n` +
                `Nonce: ${Math.floor(Math.random() * 1000000)}\n\n` +
                `Click OK to sign securely.`
            );

            if (signRequest) {
                executeAuthenticationProcess(`${walletType}_Holder`);
            }
        }
    </script>
</body>
</html>
